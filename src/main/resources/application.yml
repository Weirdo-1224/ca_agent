spring:
  application:
    name: CA_Agent

  datasource:
    url: ${CA_AGENT_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ca_agent}
    username: ${CA_AGENT_DATASOURCE_USERNAME:root}
    password: ${CA_AGENT_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
