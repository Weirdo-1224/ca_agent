spring:
  application:
    name: CA_Agent

  datasource:
    url: ${CA_AGENT_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ca_agent}
    username: ${CA_AGENT_DATASOURCE_USERNAME:root}
    password: ${CA_AGENT_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

  ai:
    model:
      chat: ${CA_AGENT_AI_MODEL_CHAT:none}
      embedding: none
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none
    openai:
      api-key: ${CA_AGENT_OPENAI_API_KEY:}
      base-url: ${CA_AGENT_OPENAI_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}
      chat:
        completions-path: ${CA_AGENT_OPENAI_CHAT_COMPLETIONS_PATH:/chat/completions}
        options:
          model: ${CA_AGENT_OPENAI_CHAT_MODEL:doubao-seed-2-0-lite-260215}
          temperature: ${CA_AGENT_OPENAI_TEMPERATURE:0.3}
          max-tokens: ${CA_AGENT_OPENAI_MAX_TOKENS:2048}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

ca-agent:
  agent:
    mode: ${CA_AGENT_AGENT_MODE:mock}
